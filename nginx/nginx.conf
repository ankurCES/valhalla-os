worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Enable sub_filter for seamless theme injection
    sub_filter_once off;
    sub_filter_types text/html;

    server {
        listen 80;

        # Serve the seamless theme file
        location /theme/valhalla-seamless.css {
            alias /usr/share/nginx/html/valhalla-seamless.css;
        }

        # 1. Valhalla Portal (Root)
        location / {
            proxy_pass http://portal:5173;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 2. Open WebUI (Chat)
        location /chat/ {
            proxy_pass http://chat:8080/;
            proxy_set_header Host $host;
            # Injecting global CSS to ensure seamless UI matching the shell
            sub_filter '</head>' '<link rel="stylesheet" href="/theme/valhalla-seamless.css"></head>';
        }

        # 3. n8n (Workflow)
        location /n8n/ {
            proxy_pass http://n8n:5678/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            sub_filter '</head>' '<link rel="stylesheet" href="/theme/valhalla-seamless.css"></head>';
        }

        # 4. Superset (Analytics)
        location /superset/ {
            proxy_pass http://superset:8088/;
            proxy_set_header Host $host;
            sub_filter '</head>' '<link rel="stylesheet" href="/theme/valhalla-seamless.css"></head>';
        }
    }
}
