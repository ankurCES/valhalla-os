worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Dynamic Theme Injection Logic
    sub_filter_once off;
    sub_filter_types text/html text/css application/javascript;

    # Route assets to correct backend based on referer
    map $http_referer $app_backend {
        ~*/n8n/      n8n:5678;
        ~*/superset/ superset:8088;
        default      chat:8080;
    }

    server {
        listen 80;

        # Disable Frame restrictions for unified UI
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        add_header X-Frame-Options "SAMEORIGIN";

        # Serve static theme engine
        location /theme/valhalla-seamless.css {
            alias /usr/share/nginx/html/valhalla-seamless.css;
        }
        location /theme/valhalla-inject.js {
            alias /usr/share/nginx/html/valhalla-inject.js;
        }

        # Root: Valhalla Shell (Open WebUI)
        location / {
            proxy_pass http://chat:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
            # Global Injection of Enterprise Identity
            sub_filter '</body>' '<script src="/theme/valhalla-inject.js"></script></body>';
            sub_filter '</head>' '<link rel="stylesheet" href="/theme/valhalla-seamless.css"></head>';
        }

        # Automation Forge (n8n)
        location /n8n/ {
            proxy_pass http://n8n:5678/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            sub_filter '</head>' '<link rel="stylesheet" href="/theme/valhalla-seamless.css"></head>';
        }

        # Intelligence Stream (Superset)
        location /superset/ {
            proxy_pass http://superset:8088/;
            proxy_set_header Host $host;
            sub_filter '</head>' '<link rel="stylesheet" href="/theme/valhalla-seamless.css"></head>';
        }

        # Micro-Frontend Asset Routing
        location ~* ^/(_app|static|assets|node_modules|@vite|@id|@fs|api/v1|favicon.ico)/ {
            proxy_pass http://$app_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
