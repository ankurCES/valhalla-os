worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Enable sub_filter for theme injection
    sub_filter_once off;
    sub_filter_types text/html text/css application/javascript;

    server {
        listen 80;

        # 1. Valhalla Portal (Root)
        location / {
            proxy_pass http://portal:5173;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 2. Open WebUI (Chat)
        location /chat/ {
            proxy_pass http://chat:8080/;
            proxy_set_header Host $host;
            # Seamless Theme Injection: Force slate-950 background and blue-600 buttons via CSS
            sub_filter '</head>' '<style>
                :root { --bg-canvas: #020617 !important; --color-primary: #2563eb !important; }
                body { background-color: #020617 !important; color: #f1f5f9 !important; }
                .sidebar { background-color: #0f172a !important; border-right: 1px solid #1e293b !important; }
            </style></head>';
        }

        # 3. n8n (Workflow)
        location /n8n/ {
            proxy_pass http://n8n:5678/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            sub_filter '</head>' '<style>
                .n8n-app { --color-primary: #2563eb !important; --color-background-base: #020617 !important; }
                header { display: none !important; } /* Hide sub-header for seamless shell */
            </style></head>';
        }

        # 4. Superset (Analytics)
        location /superset/ {
            proxy_pass http://superset:8088/;
            proxy_set_header Host $host;
            sub_filter '</head>' '<style>
                body { background-color: #020617 !important; }
                .navbar { display: none !important; } /* Hide redundant navbar */
            </style></head>';
        }
    }
}
