# valhalla-os/docker-compose.yml

version: '3.8'

services:
  # 1. API Gateway (Nginx OSS)
  gateway:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/theme/valhalla-seamless.css:/usr/share/nginx/html/valhalla-seamless.css:ro
      - ./nginx/theme/valhalla-inject.js:/usr/share/nginx/html/valhalla-inject.js:ro
    ports:
      - "80:80"
    networks:
      - valhalla-net

  # 3. n8n (Automation Engine)
  n8n:
    image: n8nio/n8n:latest
    environment:
      - N8N_PATH=/n8n/
    networks:
      - valhalla-net

  # 4. Open WebUI (Chat Sovereign & Primary Shell)
  chat:
    build: 
      context: ./forks/open-webui
      dockerfile: Dockerfile.valhalla
    environment:
      - WEBUI_AUTH=False
      - WEBUI_NAME=Valhalla Chat
      - PORT=8080
    networks:
      - valhalla-net

  # 5. Apache Superset (Intelligence)
  superset:
    image: apache/superset:latest
    environment:
      - SUPERSET_SECRET_KEY=spear_of_odin_12345
      - ENABLE_PROXY_FIX=True
    networks:
      - valhalla-net

networks:
  valhalla-net:
    driver: bridge
